<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    
    <nav class="navbar navbar-expand-lg bg-gradient" style="background: linear-gradient(90deg, #db7093, #c71585) !important;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="{{url_for('home')}}">User Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="{{url_for('home')}}">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <form method="post" class="d-flex flex-grow-1">
        <div class="container d-flex justify-content-center align-items-center flex-grow-1">
            <div class="card shadow p-5 text-center" style="width: 400px;">
                <h2 class="mb-4">Register</h2>
                {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
                <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>
                <select name="role" class="form-select mb-3" required>
                    <option value="user" selected>User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" class="btn btn-success w-100">Create Account</button>
                <p class="text-muted small mt-3 mb-0">Admin users can access admin dashboard and write API endpoints.</p>
            </div>
        </div>
    </form>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
