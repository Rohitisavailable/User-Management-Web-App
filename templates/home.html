<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg bg-gradient" style="background: linear-gradient(90deg, #db7093, #c71585) !important;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="{{url_for('home')}}">User Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="{{url_for('home')}}">Home</a>
                    </li>
                    {% if session_user %}
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{url_for('employee')}}">Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{url_for('logout')}}">Logout</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center flex-grow-1">
        <div class="card shadow p-5 text-center" style="width: 440px;">
            <h2 class="mb-3">Welcome</h2>
            <p class="text-muted">Employee Management System</p>

            {% if session_user %}
                <p class="mb-3">Logged in as <strong>{{ session_user }}</strong></p>
                <a href="{{url_for('employee')}}" class="btn btn-primary mb-2 w-100">View Employees</a>
                <a href="{{url_for('logout')}}" class="btn btn-outline-danger w-100">Logout</a>
            {% else %}
                <a href="{{url_for('login')}}" class="btn btn-primary mb-3 w-100">Login</a>
                <a href="{{url_for('register')}}" class="btn btn-success w-100">Register</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
